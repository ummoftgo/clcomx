name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Build Tauri app
        run: npx tauri build

      - name: Package portable zip
        shell: pwsh
        run: ./scripts/package-portable-windows.ps1 -ProjectDir $PWD.Path

      - name: Create or update GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $tag = $env:TAG_NAME
          $version = $tag.TrimStart("v")
          $notesPath = Join-Path $PWD "docs/version/$version.md"
          $assetPatterns = @(
            "src-tauri/target/release/bundle/nsis/*.exe"
            "src-tauri/target/release/bundle/portable/*.zip"
          )

          $assets = @()
          foreach ($pattern in $assetPatterns) {
            $matchedFiles = Get-ChildItem -Path $pattern -File
            if (-not $matchedFiles) {
              throw "No release artifacts matched: $pattern"
            }

            $assets += $matchedFiles.FullName
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            $createArgs = @("release", "create", $tag, "--title", "CLCOMX $version")
            if (Test-Path $notesPath) {
              $createArgs += @("--notes-file", $notesPath)
            } else {
              $createArgs += "--generate-notes"
            }

            gh @createArgs
          }

          gh release upload $tag @assets --clobber
